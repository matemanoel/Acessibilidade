<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
     <!-- Torna a página responsiva-->

    <title>Programação Inclusiva</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<header>
    <h1 tabindex="1">Computação Inclusiva</h1>
</header>

<nav>
 <!-- Botão para aumentar o tamanho da fonte. -->
   <button id="fonteMais" tabindex="2">
        A+
    </button>

 <!-- Botão para diminuir o tamanho da fonte. -->
    <button id="fonteMenos" tabindex="3">
        A-
    </button>

<!-- Botão que ativa ou desativa o modo de alto contraste-->
    <button id="contraste" tabindex="4">
        Alto Contraste
    </button>
 <!-- Botão que altera a página para o modo escuro para -- >
   <button id="escuro" tabindex="5">
        Modo Escuro
    </button>

 <!-- Botão para ler o conteúdo da página em voz alta. -->
        <button id="ler" onclick="lerPagina()" tabindex="6">🔊 Ler Página</button>

 <!-- Botão para parar de ler o conteúdo da página em voz alta. -->
        <button onclick="pararLeitura()" tabindex="7">⏹ Parar</button>

</nav>

<main>
    <h2 tabindex="8">O que é Acessibilidade?</h2>
    <p id="texto" tabindex="9">
        A acessibilidade digital permite que qualquer
        pessoa utilize sistemas computacionais
        independentemente de suas limitações.
    </p>
    <img src="acessibilidade.png" alt="Pessoa utilizando computador com tecnologia assistiva" tabindex="10">
    <figcaption tabindex="11">
<p>        Figura 1 - Pessoa utilizando computador com tecnologia assistiva.</p>
    </figcaption>
</main>
